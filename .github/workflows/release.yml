name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build-cmd: npm run build:linux
            artifact: dist/*.AppImage
          - os: windows-latest
            build-cmd: npm run build:win
            artifact: dist/*.exe
          - os: macos-latest
            build-cmd: npm run build:mac
            artifact: dist/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: ${{ matrix.build-cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nihongolofi-${{ steps.version.outputs.VERSION }}-${{ runner.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
          tag_name: ${{ github.ref_name }}
          name: NihongoLofi ${{ github.ref_name }}
          body: |
            ## NihongoLofi v${{ github.ref_name }}

            Pomodoro timer with live Japanese lofi music.

            ### Downloads
            - **Linux**: `NihongoLofi-*.AppImage` — chmod +x and run
            - **Windows**: `NihongoLofi Setup *.exe` — NSIS installer
            - **macOS**: `NihongoLofi-*.dmg` — drag to Applications

            ### Requirements
            - **Linux / macOS**: `yt-dlp` must be installed on your PATH
            - **Windows**: yt-dlp is bundled — no manual setup required
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
