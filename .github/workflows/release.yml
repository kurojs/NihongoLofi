name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build AppImage
        run: npm run build:linux
      
      - name: Get version
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.AppImage
          tag_name: ${{ github.ref_name }}
          name: Nihongo ${{ github.ref_name }}
          body: |
            ## 日本語 Stream Timer v${{ steps.version.outputs.VERSION }}
            
            Aplicación de escritorio para estudiar japonés con streams en vivo.
            
            ### Instalación
            1. Descarga el archivo `.AppImage`
            2. Dale permisos de ejecución: `chmod +x Nihongo-*.AppImage`
            3. Ejecuta: `./Nihongo-*.AppImage`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
