<!doctype html>
<html>

<head>
    <title>日本語</title>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./window-controls.css">
</head>

<body>

    <div class="window-controls">
        <button class="window-button close-button" id="close-btn"></button>
        <button class="window-button minimize-button" id="minimize-btn"></button>
        <button class="window-button maximize-button" id="maximize-btn"></button>
    </div>

    <header>
        <div class=header-bar>
            <img src="/img/heart.png" class="logo">
            <h1 class=title>日本語</h1>

            <button class=settings-toggle>
                <img src="./../img/gear.png" class="gear rotate" alt="Settings" draggable="false">
            </button>
        </div>

        <div class="settings">
            <div class="container">
                <label class="work-length" for="work-length">Trabajo:</label>
                <input class="work-length form-control" id="work-length" name="work-length" type=number value=25>
                <label class="work-length" for="userWorkTime">minutos</label>
                <label class="break-length" for="break-length">Descanso:</label>
                <input class="break-length form-control" id="break-length" name="break-length" type=number value=5>
                <label class="break-length" for="break-length">minutos</label>
                <div class="button-container">
                    <button id="save-button" class="btn btn-outline-secondary save-button">Guardar</button>
                </div>
            </div>

            <hr id="hor-line"/>
            
            <div class="enable-container">
                <div class="flexbox">
                    <label class="enable-notifs" for="enable-notifs">Notificaciones: </label>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="enable-notifs" checked>
                    </div>
                </div>
                
                <div class="flexbox">
                    <label class="enable-alarms" for="enable-alarms">Alarma:</label>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="enable-alarms" checked>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <iframe class="lofi-vid" width="397" height="226" 
        src="https://www.youtube.com/embed/d6f46ZUzJig?autoplay=1&mute=0&controls=1&modestbranding=1&rel=0"
        title="YouTube video player" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

    <div class="bottom-bar">
        <div class="bottom-flex">
            <div class=time-rect>
                <div class="time-display"></div>
                <div class="progress-bar"></div>
            </div>

            <button class="pause-button btn btn-outline-danger">
                <img src="./../img/pauseButton.png" class="button-content" alt="Pause">
            </button>
        </div>

        <div class="pomodoros-completed"></div>
    </div>
    <script src="./window-controls.js"></script>
    <script src="../timer.js"></script>
</body>

</html>
